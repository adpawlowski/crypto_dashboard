<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Crypto Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body>

<header>
  <h1>💰 Crypto Dashboard</h1>
</header>

<main>

<div id="searchSection">
  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Szukaj kryptowaluty">
    <button>Szukaj</button>
  </form>
</div>

<div id="controls">
  <button onclick="sortByPrice()">Sortuj po cenie ↓</button>
  <button onclick="showFavorites()">⭐ Ulubione</button>
  <button onclick="resetList()">🔄 Wszystkie</button>
</div>

<p id="favCount"></p>

<div id="loader">Ładowanie...</div>

<div id="listView">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Nazwa</th>
        <th>Cena</th>
        <th>Market Cap</th>
        <th>⭐</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div id="pagination"></div>
</div>


<div id="detailsView" class="hidden">
  <button onclick="goBack()">⬅ Powrót</button>
  <div id="details"></div>
</div>

<div id="formView" class="hidden">
  <button onclick="goBack()">⬅ Powrót</button>

  <h2>Dodaj / edytuj notatkę</h2>
  <form id="noteForm">
    <input type="text" id="noteInput" placeholder="Twoja notatka">
    <button>Zapisz</button>
  </form>
</div>

</main>

<footer>
  Adrian Pawłowski | Łukasz Sosna
</footer>

<script src="storage.js"></script>
<script src="api.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
